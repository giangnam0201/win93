<div class="demo | pa outset panel">
  <fieldset class="aligned">
    <legend>Button</legend>

    <div>
      <span class="label">Single button</span>
      <button type="button"><span>Button</span></button>
    </div>

    <div>
      <span class="label">Cols</span>
      <div class="cols">
        <button type="button">
          <span>Button</span>
        </button>
        <button class="button-default" type="button">
          <span>Input</span>
        </button>
      </div>
    </div>

    <div>
      <span class="label">Cols</span>
      <div class="cols">
        <input type="button" value="Input" />
        <input type="button" value="Input" />
      </div>
    </div>

    <div>
      <span class="label">Button</span>
      <div>
        <button type="button"><span>Button</span></button>
        <button type="reset"><span>Reset</span></button>
        <button type="submit"><span>Submit</span></button>
        <button type="submit">
          <ui-picto value="puzzle"></ui-picto>
          <span>Picto</span>
        </button>
        <button type="submit"><ui-picto value="cog"></ui-picto></button>
        <button type="submit"><ui-picto value="warning"></ui-picto></button>
      </div>
    </div>

    <div>
      <span class="label">Link</span>
      <div>
        <a class="button" href="javascript:;"><span>Button</span></a>
        <a class="button" href="javascript:;"><span>Reset</span></a>
        <a class="button" href="javascript:;"><span>Submit</span></a>
        <a class="button" href="javascript:;">
          <ui-picto value="puzzle"></ui-picto>
          <span>Picto</span>
        </a>
        <a class="button" href="javascript:;">
          <ui-picto value="cog"></ui-picto>
        </a>
        <a class="button" href="javascript:;">
          <ui-picto value="error"></ui-picto>
        </a>
      </div>
    </div>

    <div>
      <span class="label">Input</span>
      <div>
        <input type="button" value="Button" />
        <input type="reset" value="Reset" />
        <input type="submit" value="Submit" />
      </div>
    </div>

    <hr />

    <div class="stack colspan">
      <div>
        <button class="primary"><span>Primary</span></button>
        <button class="secondary"><span>Secondary</span></button>
        <button class="default"><span>Default</span></button>
      </div>

      <div>
        <input class="primary" type="button" value="Primary" />
        <input class="secondary" type="reset" value="Secondary" />
        <input class="default" type="submit" value="Default" />
      </div>

      <div>
        <a class="button primary" href="javascript:;"><span>Primary</span></a>
        <a class="button secondary" href="javascript:;"
          ><span>Secondary</span></a
        >
        <a class="button default" href="javascript:;"><span>Default</span></a>
      </div>
    </div>
  </fieldset>
</div>
