<div class="demo | pa outset panel" id="demo-controls-addons">
  <fieldset class="aligned">
    <legend>Inputs with addons</legend>

    <div>
      <label for="a-ir">Range input</label>
      <input type="range" id="a-ir" value="10" />
    </div>

    <div>
      <label for="a-ic">Color input</label>
      <input type="color" id="a-ic" value="#bada55" />
    </div>

    <div>
      <label for="a-in">Number input</label>
      <input
        type="number"
        id="a-in"
        min="0"
        max="10"
        value="5"
        placeholder="Enter a Number" />
    </div>

    <div>
      <label for="a-if">File input</label>
      <input type="file" id="a-if" />
    </div>

    <div>
      <label for="a-idd">Date input</label>
      <input type="date" id="a-idd" value="1970-01-01" />
    </div>

    <div>
      <label for="a-idm">Month input</label>
      <input type="month" id="a-idm" value="1970-01" />
    </div>

    <div>
      <label for="a-idtl">Datetime input</label>
      <input type="datetime-local" id="a-idtl" value="1970-01-01T00:00" />
    </div>

    <div>
      <label for="a-idw">Week input</label>
      <input type="week" id="a-idw" value="1970-W01" />
    </div>

    <div>
      <label for="a-tf">Textfield</label>
      <input type="text" id="a-tf" value="WgjFfÀ- At eight o'clock" />
    </div>

    <div>
      <label for="a-textarea">Textarea</label>
      <textarea id="a-textarea" placeholder="Enter your message here" rows="3">
WgjFfÀ- At eight o'clock on Thursday morning Arthur didn't feel very good. He woke up blearily, got up, wandered blearily round his room, opened a window, saw a bulldozer, found his slippers, and stomped off to the bathroom to wash.
Toothpaste on the brush—so. Scrub.
Shaving mirror—pointing at the ceiling. He adjusted it. For a moment it reflected a second bulldozer through the bathroom window. Properly adjusted, it reflected Arthur Dent's bristles. He shaved them off, washed, dried and stomped off to the kitchen to find something pleasant to put in his mouth.</textarea
      >
    </div>

    <div>
      <label for="a-select-m">Select (multiple)</label>
      <select id="a-select-m" size="3">
        <option selected>Option One</option>
        <option>Option Two</option>
        <option>Option Three</option>
      </select>
    </div>

    <div>
      <label for="a-select">Select</label>
      <select id="a-select">
        <optgroup label="Option Group">
          <option selected>Option One</option>
          <option>Option Two</option>
          <option>Option Three</option>
        </optgroup>
      </select>
    </div>

    <div>
      <label for="a-idl">Datalist</label>
      <input type="text" id="a-idl" list="a-example-list" value="Option One" />
      <datalist id="a-example-list">
        <option value="Option One"></option>
        <option value="Option Two"></option>
        <option value="Option Three"></option>
      </datalist>
    </div>
  </fieldset>
</div>
