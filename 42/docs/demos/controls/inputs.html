<div class="demo | pa outset panel">
  <fieldset class="aligned">
    <legend>Inputs</legend>

    <p>
      <label for="inputPassword">Password</label>
      <input
        id="inputPassword"
        type="password"
        placeholder="Type your Password" />
    </p>
    <p>
      <label for="inputUrl">Web Address</label>
      <input id="inputUrl" type="url" placeholder="https://yoursite.com" />
    </p>
    <p>
      <label for="inputEmail">Email Address</label>
      <input id="inputEmail" type="email" placeholder="name@email.com" />
    </p>
    <p>
      <label for="inputTel">Phone Number</label>
      <input id="inputTel" type="tel" placeholder="(999) 999-9999" />
    </p>
    <p>
      <label for="inputSearch">Search</label>
      <input id="inputSearch" type="search" placeholder="Enter Search Term" />
    </p>

    <div class="control-box control-box--checkbox">
      <input id="inputcheckbox" type="checkbox" />
      <label for="inputcheckbox">checkbox</label>
    </div>

    <div class="control-box control-box--checkbox">
      <label for="inputcheckbox2">checkbox</label>
      <input id="inputcheckbox2" type="checkbox" />
    </div>
  </fieldset>
</div>
