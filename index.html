<style id="bootStyles">
  @font-face {
    font-family: TomoBios;
    src:
      url("./42/themes/tribute/windows9x/fonts/tomo/Tomo.woff2") format("woff2"),
      url("./42/themes/tribute/windows9x/fonts/tomo/Tomo.woff") format("woff"),

  body {
    background: #000;
    color: #c3ff00;
    margin: 0;
    height: 100dvh;
  }
  #os {
    opacity: 0;
    pointer-events: none;
  }
  #boot {
    position: fixed;
    z-index: 1;
    background: #000;
    padding: 2ex 2ch;
    inset: 0;

    line-height: 13.3333px;
    overflow-y: scroll;
    scrollbar-width: none;
  }
  #boot > * { white-space: pre-wrap; }
  #boot:not(.reload)::after {
    content: "_";
    display: block;
    animation: blink 1s step-start infinite;

  @keyframes blink { 50% { opacity: 0; } }
