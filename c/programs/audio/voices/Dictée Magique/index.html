<!DOCTYPE html>
<html lang="en">

<head>
  <title>Dictée Magique 💖</title>
  <link rel="stylesheet" href="/style.css" />
  <script src="/42/core.js"></script>
  <script type="module" src="/42/ui/media/picto.js"></script>
  <script type="module" src="/42/ui/control/knob.js"></script>
  <style>
    #text {
      width: 162px;
    }

    #stopSpeaking {
      display: none;
    }

    #letters {
      margin-top: 2px;
      padding-bottom: 12px;
    }

    #letters>button {
      width: 10px;
      height: 10px;
    }

    * {
      user-select: none;
    }

    h3 {
      text-align: center;
    }

    ui-knob {
      /*--knob-size: 56px;*/
      --knob-size: 52px;
    }

    .control-box--knob>label {
      padding-top: 5px;
    }

    body {
      overflow: hidden;
    }

    #letterSpace {
      width: 89px !important;
    }

    #screen {
      background: #000;
      color: #C3FF00;
      text-align: right;
      padding: 7px;
      height: 45px;
      width: 228px;
      overflow: hidden;
      line-height: 30px;
    }

    input[type="checkbox"] {
      width: 4px;
      height: 4px;
      position: absolute;
      top: -3px;
      left: -5px;
      box-sizing: inherit;
    }

    input[type="checkbox"]:checked {
      background-color: #000;
    }
  </style>
</head>

<body>
  <fieldset style="margin-top:7px;">
    <h3 id="screen" class="inset">Dictée Magique</h3>
    <div>
      <hr>
      <div class="cols">
        <input id="text" type="text" value="" autocomplete="off">
        <button id="startSpeaking" title="Play">
          <ui-picto value="play"></ui-picto>
        </button>
        <button id="stopSpeaking" title="Play">
          <ui-picto value="stop"></ui-picto>
        </button>
        <button id="loop" title="Loop" aria-pressed="false">
          <ui-picto value="loop"></ui-picto>
        </button>
      </div>
    </div>
    <hr>
    <div class="cols">
      <div class="control-box control-box--knob">
        <ui-knob ringless min="0.01" max="100" value="50" step="0.01" id="pitch" title="pitch" tabindex="0"
          style="--fraction: 0.5; touch-action: none;">
          <div class="ui-knob__ring-box">
            <div class="ui-knob__center"></div>
            <div class="ui-knob__ring"></div>
          </div>
          <div class="ui-knob__cap-box">
            <div class="ui-knob__cap">
              <div class="ui-knob__indicator"></div>
            </div>
          </div>
        </ui-knob>
        <label for="pitch">Pitch</label>
        <input type="checkbox" id="randomPitch">
      </div>
      <div class="control-box control-box--knob">
        <ui-knob ringless min="0" max="500" value="250" step="0.01" id="speed" title="speed" tabindex="0"
          style="--fraction: 0.5; touch-action: none;">
          <div class="ui-knob__ring-box">
            <div class="ui-knob__center"></div>
            <div class="ui-knob__ring"></div>
          </div>
          <div class="ui-knob__cap-box">
            <div class="ui-knob__cap">
              <div class="ui-knob__indicator"></div>
            </div>
          </div>
        </ui-knob>
        <label for="speed">Speed</label>
        <input type="checkbox" id="randomSpeed">
      </div>
      <div class="control-box control-box--knob">
        <ui-knob ringless min="40" max="1160" value="350" step="1" id="wordgap" title="wordgap" tabindex="0"
          style="--fraction: 0.5; touch-action: none;">
          <div class="ui-knob__ring-box">
            <div class="ui-knob__center"></div>
            <div class="ui-knob__ring"></div>
          </div>
          <div class="ui-knob__cap-box">
            <div class="ui-knob__cap">
              <div class="ui-knob__indicator"></div>
            </div>
          </div>
        </ui-knob>
        <label for="wordgap">Gap</label>
        <input type="checkbox" id="randomGap">
      </div>

      <div class="control-box control-box--knob">
        <ui-knob ringless min="0" max="0.33" value="0" step="0.01" id="disto" title="Disto" tabindex="0"
          style="--fraction: 0.5; touch-action: none;">
          <div class="ui-knob__ring-box">
            <div class="ui-knob__center"></div>
            <div class="ui-knob__ring"></div>
          </div>
          <div class="ui-knob__cap-box">
            <div class="ui-knob__cap">
              <div class="ui-knob__indicator"></div>
            </div>
          </div>
        </ui-knob>
        <label for="disto">Boost</label>
      </div>
    </div>
  </fieldset>
  <fieldset id="letters">
    <button>A</button>
    <button>B</button>
    <button>C</button>
    <button>D</button>
    <button>E</button>
    <button>F</button>
    <button>G</button>
    <button>H</button>
    <button>I</button>
    <button>J</button>
    <button>K</button>
    <button>L</button>
    <button>M</button>
    <button>N</button>
    <button>O</button>
    <button>P</button>
    <button>Q</button>
    <button>R</button>
    <button>S</button>
    <button>T</button>
    <button>U</button>
    <button>V</button>
    <button>W</button>
    <button>X</button>
    <button>Y</button>
    <button>Z</button>
    <button id="letterSpace">space</button>
    <button>1</button>
    <button>2</button>
    <button>3</button>
    <button>4</button>
    <button>5</button>
    <button>6</button>
    <button>7</button>
    <button>8</button>
    <button>9</button>
    <button>0</button>
  </fieldset>
  <!--<div id="audio"></div>-->
  <script src="speakClient.js"></script>
  <script type="module">
    let currentWordIndex = 0;
    let isSpeaking = false;
    let timeoutId;
    let words = [];
    function startSpeaking() {
      if (isSpeaking) return;
      document.getElementById('stopSpeaking').style.display = 'inline-flex';
      document.getElementById('startSpeaking').style.display = 'none';
      isSpeaking = true;
      speakNextWord();
    }
    document.getElementById('startSpeaking').addEventListener('click', startSpeaking);
    function speakNextWord() {
      if (currentWordIndex >= words.length) {
        const loop = document.getElementById('loop').getAttribute('aria-pressed') === 'true';
        if (loop) {
          currentWordIndex = 0;
        } else {
          stopSpeaking();
          return;
        }
      }
      const amplitude = 100;
      let pitch = document.querySelector("#pitch").valueAsNumber;
      if (document.getElementById('randomPitch').checked) {
        pitch = Math.random() * 99.99 + 0.01;
      }
      let speed = document.querySelector("#speed").valueAsNumber;
      if (document.getElementById('randomSpeed').checked) {
        speed = Math.random() * 1160 + 40;
      }
      speak(words[currentWordIndex], {
        amplitude: amplitude,
        pitch: pitch,
        speed: speed,
        wordGap: 0,
        voice: 'en/en-us'
      });
      document.getElementById('screen').innerText = words[currentWordIndex];
      currentWordIndex++;
      let wordGap = parseInt(document.querySelector("#wordgap").valueAsNumber, 10) || 300;
      if (wordGap < 10) wordGap = 10;
      if (document.getElementById('randomGap').checked) {
        wordGap = Math.random() * 1190 + 10;
      }
      timeoutId = setTimeout(speakNextWord, wordGap);
    }
    function stopSpeaking() {
      document.getElementById('stopSpeaking').style.display = 'none';
      document.getElementById('startSpeaking').style.display = 'inline-flex';
      clearTimeout(timeoutId);
      isSpeaking = false;
      currentWordIndex = 0;
    }
    document.getElementById('stopSpeaking').addEventListener('click', stopSpeaking);
    function updateWords() {
      const textInput = document.getElementById('text').value;
      const newWords = textInput.split(' ');
      currentWordIndex = currentWordIndex % newWords.length;
      words = newWords;
    }
    document.getElementById('text').addEventListener('input', updateWords);
    window.onload = () => {
      updateWords();
    };
    document.getElementById('loop').addEventListener('click', () => {
      const loopButton = document.getElementById('loop');
      const currentState = loopButton.getAttribute('aria-pressed') === 'true';
      loopButton.setAttribute('aria-pressed', !currentState);
    });
    const lettersFieldset = document.getElementById('letters');
    const textInput = document.getElementById('text');
    function readLetter(letter) {
      const amplitude = 100;
      const pitch = document.querySelector("#pitch").valueAsNumber || 1;
      const speed = document.querySelector("#speed").valueAsNumber || 1;
      speak(letter, {
        amplitude: amplitude,
        pitch: pitch,
        speed: speed,
        wordGap: 0,
        voice: 'en/en-us'
      });
    }
    function toggleAriaPressed(button, state) {
      button.setAttribute('aria-pressed', state.toString());
    }
    lettersFieldset.addEventListener('click', (event) => {
      if (event.target.tagName === 'BUTTON') {
        let letter = event.target.textContent;
        toggleAriaPressed(event.target, true);
        readLetter(letter);
        if (letter == "space") { letter = ' ' }
        textInput.value += letter;
        updateWords();
        setTimeout(() => toggleAriaPressed(event.target, false), 200);
      }
    });
    document.addEventListener('keydown', (event) => {
      const isTextFocused = document.activeElement === document.getElementById('text');
      if (event.key == "Enter") {
        if (!isSpeaking) {
          startSpeaking();
        } else {
          stopSpeaking();
        }
        event.preventDefault();
        return;
      }
      if (event.key == "Backspace") {
        if (!isTextFocused) {
          textInput.value = textInput.value.slice(0, -1);
          updateWords();
          return;
        }
      }
      let letter = event.key.toUpperCase();
      if (event.key === ' ') {
        letter = 'space';
        const spaceButton = document.getElementById('letterSpace');
        if (spaceButton) {
          toggleAriaPressed(spaceButton, true);
        }
        readLetter(letter);
        if (!isTextFocused) {
          textInput.value += ' ';
          updateWords();
        }
        setTimeout(() => {
          if (spaceButton) toggleAriaPressed(spaceButton, false);
        }, 200);
        if (!isTextFocused) { event.preventDefault(); }
        return;
      }
      const button = Array.from(lettersFieldset.querySelectorAll('button'))
        .find(btn => btn.textContent === letter);
      if (button) {
        toggleAriaPressed(button, true);
        if (!isTextFocused) {
          textInput.value += event.key;
          updateWords();
        }
        readLetter(event.key);
        setTimeout(() => toggleAriaPressed(button, false), 200);
      } else {
        if (!isTextFocused) {
          const specialKeys = [
            'Meta', 'Control', 'Shift', 'Alt', 'Tab', 'CapsLock', 'Escape',
            'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Enter', 'Backspace'
          ];
          if (specialKeys.includes(event.key)) {
            return;
          }
          textInput.value += event.key;
          updateWords();
        }
      }
    });
    document.addEventListener('DOMContentLoaded', () => {
      const distoKnob = document.getElementById('disto');
      distoKnob.addEventListener('input', () => {
        if (boost == undefined) { return; }
        boost.update(distoKnob.value)
      });
    });
  </script>
</body>

</html>
