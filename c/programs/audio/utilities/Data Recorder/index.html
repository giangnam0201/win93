<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Data Recorder</title>
    <link rel="stylesheet" href="/style.css" />
    <script src="/42/core.js"></script>
  </head>

  <body>
    <main class="rows fit">
      <fieldset class="grow">
        <legend>Encode data to audio</legend>
        <div class="rows gap h-full">
          <textarea class="screen grow" id="input" rows="4" cols="40">sys42.alert('Hello World');</textarea>
          <button id="btnEncode">Save to Audio (WAV)</button>
        </div>
      </fieldset>

      <fieldset class="grow">
        <legend>Load data from audio</legend>
        <div class="rows gap h-full">
          <button id="btnDecode">Load from Audio (WAV)</button>
          <textarea class="screen grow" id="output" rows="4" cols="40"></textarea>
          <div class="cols shrink gap-xxs">
            <div class="shrink">
              <input type="checkbox" id="doEval" checked />
              <label for="doEval">Autoexec</label>
            </div>
            <div>
              <button id="btnEval" style="width: 100%">Execute decoded script</button>
            </div>
          </div>
        </div>
      </fieldset>
    </main>

    <script type="module">
      let ctx
      const BIT_DURATION = 0.01
      const FREQ_0 = 1200
      const FREQ_1 = 2400
      const SILENCE = 0.3
      const CAL_TIME = 0.5
      const SYNC_BITS = "1010101010101010"

      const input = document.querySelector("#input")
      const output = document.querySelector("#output")
      const doEval = document.querySelector("#doEval")

      function textToBits(text) {
        return text
          .split("")
          .map((c) => c.charCodeAt(0).toString(2).padStart(8, "0"))
          .join("")
      }

      function bitsToText(bits) {
        let out = ""
        for (let i = 0; i < bits.length; i += 8) {
          const b = bits.slice(i, i + 8)
          if (b.length === 8) out += String.fromCharCode(Number.parseInt(b, 2))
        }
        return out
      }

      function encodeAudioBlob() {
        const SAMPLE_RATE = 44100 // on encode toujours à 44.1kHz
        const payload = textToBits(input.value)

        const bits =
          "0".repeat(Math.floor(CAL_TIME / BIT_DURATION)) +
          "1".repeat(Math.floor(CAL_TIME / BIT_DURATION)) +
          SYNC_BITS +
          payload

        const samplesPerBit = Math.floor(SAMPLE_RATE * BIT_DURATION)
        const silenceSamples = Math.floor(SAMPLE_RATE * SILENCE)
        const totalSamples = silenceSamples + bits.length * samplesPerBit

        const samples = new Float32Array(totalSamples)
        let pos = silenceSamples

        for (const bit of bits) {
          const freq = bit === "1" ? FREQ_1 : FREQ_0
          for (let i = 0; i < samplesPerBit; i++) {
            samples[pos++] = Math.sin(2 * Math.PI * freq * (i / SAMPLE_RATE))
          }
        }

        return floatToWav(samples, SAMPLE_RATE)
      }

      function floatToWav(samples, sampleRate) {
        const buffer = new ArrayBuffer(44 + samples.length * 2)
        const view = new DataView(buffer)
        const write = (o, s) =>
          [...s].forEach((c, i) => view.setUint8(o + i, c.charCodeAt(0)))

        write(0, "RIFF")
        view.setUint32(4, 36 + samples.length * 2, true)
        write(8, "WAVEfmt ")
        view.setUint32(16, 16, true)
        view.setUint16(20, 1, true)
        view.setUint16(22, 1, true)
        view.setUint32(24, sampleRate, true)
        view.setUint32(28, sampleRate * 2, true)
        view.setUint16(32, 2, true)
        view.setUint16(34, 16, true)
        write(36, "data")
        view.setUint32(40, samples.length * 2, true)

        let o = 44
        samples.forEach((s) => {
          view.setInt16(o, Math.max(-1, Math.min(1, s)) * 0x7fff, true)
          o += 2
        })

        return new Blob([view], { type: "audio/wav" })
      }

      function decodeAudio(arrayBuffer) {
        ctx = new AudioContext()
        ctx.decodeAudioData(arrayBuffer, (buffer) => {
          const data = buffer.getChannelData(0)
          const SAMPLE_RATE = buffer.sampleRate // <- on utilise le sampleRate réel du wav
          const samplesPerBit = Math.floor(SAMPLE_RATE * BIT_DURATION)

          let pos = Math.floor(SAMPLE_RATE * SILENCE)
          pos += Math.floor(SAMPLE_RATE * CAL_TIME)
          pos += Math.floor(SAMPLE_RATE * CAL_TIME)
          pos += SYNC_BITS.length * samplesPerBit

          let bits = ""
          while (pos + samplesPerBit <= data.length) {
            const slice = data.slice(pos, pos + samplesPerBit)
            bits += detectBit(slice, SAMPLE_RATE)
            pos += samplesPerBit
          }

          const text = bitsToText(bits)
          output.value = text

          if (doEval.checked) evalSafe(text)
        })
      }

      function detectBit(samples, sampleRate) {
        const e0 = energy(samples, FREQ_0, sampleRate)
        const e1 = energy(samples, FREQ_1, sampleRate)
        return e1 > e0 ? "1" : "0"
      }

      function energy(samples, freq, sampleRate) {
        let re = 0
        let im = 0
        for (let i = 0; i < samples.length; i++) {
          const phase = (2 * Math.PI * freq * i) / sampleRate
          re += samples[i] * Math.cos(phase)
          im += samples[i] * Math.sin(phase)
        }
        return re * re + im * im
      }

      function evalOutput() {
        evalSafe(output.value)
      }

      document.querySelector("#btnEval").addEventListener("click", evalOutput)

      function evalSafe(code) {
        try {
          eval(code)
        } catch (err) {
          console.error(err)
        }
      }

      import { App } from "/42/api/os/App.js"
      const app = new App()

      document.querySelector("#btnEncode").addEventListener("click", () => app.saveFileAs())
      document.querySelector("#btnDecode").addEventListener("click", () => app.openFile())

      app
        .on("decode", async (fileAgent) => {
          console.log(fileAgent.path)
          decodeAudio(await fileAgent.getArrayBuffer())
        })
        .on("encode", async () => encodeAudioBlob())
    </script>
  </body>
</html>
