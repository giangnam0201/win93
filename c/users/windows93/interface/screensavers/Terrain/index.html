<!doctype html>
<!-- saved from url=(0020)https://helderk.com/ -->

<style>
  html,
  body {
    overflow: hidden;
    background-color: #333;
    /* background: linear-gradient(#f0f 0, #0ff 100%); */
  }
  body {
    position: absolute;
    inset: 0;
    margin: 0;
  }
</style>

<body>
  <script src="./three-min.js"></script>
  <script src="./SimplexNoise.js"></script>
  <script src="./threex.terrain.js"></script>

  <script>
    const renderer = new THREE.WebGLRenderer({ antialias: !true })

    renderer.setSize(window.innerWidth, window.innerHeight)

    document.body.append(renderer.domElement)
    const ratio = window.innerWidth / window.innerHeight
    const scene = new THREE.Scene()
    const camera = new THREE.PerspectiveCamera(25, ratio, 0.01, 1000)

    camera.position.z = 15
    camera.position.y = 2

    /* Fog provides depth to the landscape */
    scene.fog = new THREE.Fog("#222", 0, 35)

    const heightMap = THREEx.Terrain.allocateHeightMap(256, 256)
    THREEx.Terrain.simplexHeightMap(heightMap)
    const geometry = THREEx.Terrain.heightMapToPlaneGeometry(heightMap)
    THREEx.Terrain.heightMapToVertexColor(heightMap, geometry)

    /* Wireframe built-in color is white, no need to change that */
    const material = new THREE.MeshBasicMaterial({
      wireframe: true,
      color: "#aaa",
    })
    const mesh = new THREE.Mesh(geometry, material)
    scene.add(mesh)
    mesh.lookAt(new THREE.Vector3(0, 1, 0))

    mesh.rotation.x = -1.3

    mesh.scale.y = 3
    mesh.scale.x = 3
    mesh.scale.z = 0.2
    mesh.scale.multiplyScalar(10)

    let lastTimeMsec = null
    requestAnimationFrame(function animate(nowMsec) {
      requestAnimationFrame(animate)
      lastTimeMsec = lastTimeMsec || nowMsec - 1000 / 60
      const deltaMsec = Math.min(200, nowMsec - lastTimeMsec)
      lastTimeMsec = nowMsec
      mesh.rotation.z += 0.007 * (deltaMsec / 1000)
      renderer.render(scene, camera)
    })
  </script>
  <canvas></canvas>
</body>
