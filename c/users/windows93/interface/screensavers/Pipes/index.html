<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pipes</title>

<style>
  html,
  body,
  canvas {
    border: 0;
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
  }
</style>

<body></body>

<script src="lib/3.js"></script>
<script src="lib/TeapotGeometry.js"></script>

<script>
  const box = new THREE.Box3(
    new THREE.Vector3(-500, -500, -500),
    new THREE.Vector3(500, 500, 500),
  )
  box.randomPoint = function () {
    return new THREE.Vector3(
      rand(this.min.x, this.max.x),
      rand(this.min.y, this.max.y),
      rand(this.min.z, this.max.z),
    )
  }

  const cylinderBetweenPoints = function (point1, point2, material) {
    const direction = new THREE.Vector3().subVectors(point2, point1)
    const arrow = new THREE.ArrowHelper(direction.clone().normalize(), point1)

    const geom = new THREE.CylinderGeometry(
      10,
      10,
      direction.length() - 20 * 0,
      10,
      4,
      true,
    )
    const mesh = new THREE.Mesh(geom, material)

    mesh.rotation.setFromQuaternion(arrow.quaternion)
    mesh.position = new THREE.Vector3().addVectors(
      point1,
      direction.multiplyScalar(0.5),
    )
    mesh.updateMatrix()
    return mesh
  }

  const textures = {}
  const Pipe = function (scene, o) {
    const p = this
    p.pos = box.randomPoint()
    p.o3d = new THREE.Object3D()
    scene.add(p.o3d)
    if (o.texture) {
      p.mat = new THREE.MeshLambertMaterial({
        map: textures[o.texture],
      })
    } else {
      const color = ~rand(0, 0xff_ff_ff)
      const emissive = new THREE.Color(color).multiplyScalar(0.3)
      p.mat = new THREE.MeshPhongMaterial({
        specular: 0xa9_fc_ff,
        color,
        emissive,
        shininess: 100,
      })
    }

    let elbow
    p.update = function () {
      const dist = Math.floor(rand(1, 5)) * 50
      const newpos = p.pos.clone()
      if (chance(1 / 2)) {
        if (chance(1 / 3)) {
          newpos.x += dist
        } else if (chance(1 / 2)) {
          newpos.y += dist
        } else {
          newpos.z += dist
        }
      } else if (chance(1 / 3)) {
        newpos.x -= dist
      } else if (chance(1 / 2)) {
        newpos.y -= dist
      } else {
        newpos.z -= dist
      }

      if (!box.containsPoint(newpos)) {
        return
      }

      // pipe
      const cylinder = cylinderBetweenPoints(p.pos, newpos, p.mat)
      cylinder.overdraw = true
      p.o3d.add(cylinder)

      if (elbow) {
        // elbow.rotateX(Math.PI);
        // elbow.rotation = ;
        p.o3d.add(elbow)
      }

      // joint
      if (chance(1 / 200 + options.TEAPOTS / 20)) {
        // THREE.TeapotGeometry=function(size,segments,bottom,lid,body,fitLid,blinn);
        // var tptex = textures[o.texture].clone();
        // tptex.repeat.set(1,1);
        const teapot = new THREE.Mesh(
          new THREE.TeapotGeometry(15, true, true, true, true, true),
          p.mat,
          // new THREE.MeshLambertMaterial({map: tptex})
        )
        teapot.position = p.pos.clone()
        teapot.rotation.x = (Math.floor(rand(0, 50)) * Math.PI) / 2
        teapot.rotation.y = (Math.floor(rand(0, 50)) * Math.PI) / 2
        teapot.rotation.z = (Math.floor(rand(0, 50)) * Math.PI) / 2
        p.o3d.add(teapot)
      } else if (chance(1 / 20)) {
        // ball
        const ball = new THREE.Mesh(new THREE.SphereGeometry(15, 8, 8), p.mat)
        ball.position = p.pos.clone()
        p.o3d.add(ball)
      } else {
        // elbow
        // var r = 20;
        // elbow = new THREE.Mesh(new THREE.TorusGeometry(r, 10, 8, 8, Math.PI/2), p.mat);
        // elbow.position = p.pos.clone();

        // elball
        const elball = new THREE.Mesh(new THREE.SphereGeometry(10, 8, 8), p.mat)
        elball.position = p.pos.clone()
        p.o3d.add(elball)
      }

      // finish
      p.pos = newpos
    }

    p.clear = function () {
      scene.remove(p.o3d)
    }
  }

  let pipes = []
  let time = 0
  var options = {
    multiple: true,
    texture: false,
    joints: "mixed",
    interval: [16, 24], // range of seconds between fade-outs
    TEAPOTS: 0,
  }
  // renderer
  const renderer = new THREE.WebGLRenderer({
    clearColor: 0x00_00_00,
    clearAlpha: 1,
    antialias: true,
  })
  renderer.setSize(window.innerWidth, window.innerHeight)
  const canvas = renderer.domElement
  document.body.append(canvas)

  // camera
  const camera = new THREE.PerspectiveCamera(
    45,
    window.innerWidth / window.innerHeight,
    1,
    100_000,
  )
  look()

  // scene
  const scene = new THREE.Scene()

  // lighting
  const ambientLight = new THREE.AmbientLight(0x11_11_11)
  scene.add(ambientLight)

  const directionalLightL = new THREE.DirectionalLight(0xff_ff_ff, 0.9)
  directionalLightL.position.set(-1.2, 1.5, 0.5)
  scene.add(directionalLightL)

  let clearing = false
  let clear_tid = -1
  function clear(fast) {
    clearTimeout(clear_tid)
    clear_tid = setTimeout(
      clear,
      rand(options.interval[0], options.interval[1]) * 1000,
    )
    if (!clearing) {
      clearing = true
      const fade_out_time = fast ? 100 : 2000
      renderer.domElement.style.transition =
        renderer.domElement.style.oTransition =
        renderer.domElement.style.mozTtransition =
        renderer.domElement.style.webkitTransition =
          "opacity " + fade_out_time + "ms ease-in-out"
      renderer.domElement.style.opacity = 0
      setTimeout(() => {
        for (let i = 0; i < pipes.length; i++) {
          pipes[i].clear()
        }

        pipes = []
        time = 0
        look()
        clearing = false
        renderer.domElement.style.transition =
          renderer.domElement.style.oTransition =
          renderer.domElement.style.mozTtransition =
          renderer.domElement.style.webkitTransition =
            "opacity 0.5s ease-in-out"
        renderer.domElement.style.opacity = 1
      }, fade_out_time + 10)
    }
  }

  clear_tid = setTimeout(
    clear,
    rand(options.interval[0], options.interval[1]) * 1000,
  )

  // this function is executed on each animation frame
  function animate() {
    if (options.texture && !textures[options.texture]) {
      var t = THREE.ImageUtils.loadTexture(options.texture)
      t.wrapS = t.wrapT = THREE.RepeatWrapping
      t.repeat.set(2, 2)
      textures[options.texture] = t
    }

    // update
    time++
    for (var i = 0; i < pipes.length; i++) {
      pipes[i].update(scene)
    }

    if (pipes.length === 0) {
      let o = options
      if (chance(1 / 20)) {
        o = JSON.parse(JSON.stringify(options))
        o.TEAPOTS = 1
        o.texture = "candycane.png"
        if (!textures[o.texture]) {
          var t = THREE.ImageUtils.loadTexture(o.texture)
          t.wrapS = t.wrapT = THREE.RepeatWrapping
          t.repeat.set(2, 2)
          textures[o.texture] = t
        }
      }

      for (var i = 0; i < 1 + options.multiple * (1 + chance(1 / 10)); i++) {
        pipes.push(new Pipe(scene, o))
      }
    }

    renderer.render(scene, camera)

    requestAnimationFrame(animate)
  }

  function look() {
    if (chance(1 / 2)) {
      // head-on view

      camera.position = new THREE.Vector3(0, 0, 700)
    } else {
      // random view

      const vector = new THREE.Vector3(700, 0, 0)

      const axis = new THREE.Vector3(rand(-1, 1), rand(-1, 1), rand(-1, 1))
      const angle = Math.PI / 2
      const matrix = new THREE.Matrix4().makeRotationAxis(axis, angle)

      vector.applyMatrix4(matrix)
      camera.position = vector
    }

    const center = new THREE.Vector3(0, 0, 0)
    camera.lookAt(center)
  }

  addEventListener(
    "resize",
    () => {
      renderer.setSize(window.innerWidth, window.innerHeight)
      camera.aspect = window.innerWidth / window.innerHeight
      camera.updateProjectionMatrix()
    },
    false,
  )

  canvas.addEventListener(
    "mousedown",
    (e) => {
      if (e.button) {
        clear(true)
      } else {
        look()
      }

      e.preventDefault()
      if (canvas.requestFullscreen) {
        // W3C API
        canvas.requestFullscreen()
      } else if (canvas.mozRequestFullScreen) {
        // Mozilla current API
        canvas.mozRequestFullScreen()
      } else if (canvas.webkitRequestFullScreen) {
        // Webkit current API
        canvas.webkitRequestFullScreen()
      }
    },
    false,
  )

  addEventListener(
    "contextmenu",
    (e) => {
      e.preventDefault()
    },
    false,
  )

  // start animation
  animate()

  // boring helpers
  function rand(x1, x2) {
    return Math.random() * (x2 - x1) + x1
  }

  function chance(value) {
    return rand(0, 1) < value
  }
</script>
